name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  security-events: write

# Temporarily allow Node 20 while we update actions later
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
#========================
# JOB 1: Lint and Test
#========================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Run Ruff linter
        run: ruff check . --output-format=github || true

      - name: Run tests
        run: PYTHONPATH=. python -m pytest -v
  # ============================================
  # JOB 2: CodeQL Static Application Security Testing
  # ============================================
  codeql-analysis:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    
    # CodeQL needs permission to write security events
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        language: [ python ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use security + quality queries (good balance)
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
  # ============================================
  # JOB 3: Build, Container Scan & Deploy to GHCR
  # ============================================
  build-scan-deploy:
    name: Build, Scan & Deploy
    runs-on: ubuntu-latest
    needs: [lint-and-test, codeql-analysis]
    
    # Only run this job on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
